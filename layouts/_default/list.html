{{ define "main" }}
  <section class="page-shell prose">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ range .Pages }}
      <article>
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        {{ with .Description }}<p>{{ . }}</p>{{ end }}
      </article>
    {{ end }}
  </section>
{{ end }}
