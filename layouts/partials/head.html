<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#1f4d46">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
<meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
{{ if site.Params.mysite.discovery }}
  <meta name="generator" content="Created using GaryKing.org/mysite (https://gking.harvard.edu/mysite)">
  {{ if .IsHome }}
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"Person","name":"George Bai","affiliation":{"@type":"Organization","name":"MIT Sloan School of Management"},"url":"{{ .Permalink }}","isBasedOn":"https://gking.harvard.edu/mysite"}</script>
  {{ end }}
{{ end }}
{{ $style := resources.Get "css/style.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $style.RelPermalink }}" integrity="{{ $style.Data.Integrity }}">
<link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ "favicon-32x32.png" | relURL }}">
<link rel="icon" href="{{ "favicon.ico" | relURL }}" sizes="any">
<link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">
